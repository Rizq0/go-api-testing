name: Continious Integration
on: push
env:
  DBNAME: ${{ secrets.DBNAME }}
  DBUSER: ${{ secrets.DBUSER }}
  DBPASSWORD: ${{ secrets.DBPASSWORD }}
  DBHOST: ${{ secrets.DBHOST }}
jobs:
  run-code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup PSQL
        run: |
          sudo apt-get update
          sudo apt-get install postgresql postgresql-contrib -y
          sudo service postgresql start
          sudo -u postgres psql -c "CREATE ROLE ${{env.DBUSER}} WITH LOGIN PASSWORD '${{env.DBPASSWORD}}';"
          sudo -u postgres psql -c "CREATE DATABASE ${{env.DBNAME}} OWNER ${{env.DBUSER}};"
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.20
      - name: Run Linting
        run: |
          go fmt ./...
          go vet ./...
      - name: Run Tests
        run: go test
