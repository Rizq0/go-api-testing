name: Continious Integration
on: push
env:
  TESTDBNAME: ${{ secrets.DBNAME }}
  DBUSER: ${{ secrets.DBUSER }}
  DBPASSWORD: ${{ secrets.DBPASSWORD }}
  DBHOST: ${{ secrets.DBHOST }}
jobs:
  run-code-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        env:
          POSTGRES_DB: ${{ secrets.DBNAME }}
          POSTGRES_USER: ${{ secrets.DBUSER }}
          POSTGRES_PASSWORD: ${{ secrets.DBPASSWORD }}
        image: postgres:latest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.26.1
      - name: Wait for Postgres Service
        run: |
          until pg_isready -h localhost -p 5432 -U ${{ secrets.DBUSER }} -d ${{ secrets.DBNAME }}; do
            echo "Waiting for Postgres..."
            sleep 1
          done
        env:
          PGPASSWORD: ${{ secrets.DBPASSWORD }}
      - name: Run Linting
        run: |
          go fmt ./...
          go vet ./...
      - name: Run Tests
        run: go test
